<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="240">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="space-grad" cx="50%" cy="50%" r="75%" fx="20%" fy="20%">
      <stop offset="0%" stop-color="#070a1e"/>
      <stop offset="50%" stop-color="#030511"/>
      <stop offset="100%" stop-color="#000002"/>
    </radialGradient>

    <!-- Star Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Neon Lime/Green Glow Filter -->
    <filter id="glow-lime" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComponentTransfer in="blur" result="glow1">
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="240" fill="url(#space-grad)" />

  <!-- Stars with Pulsing Animations -->
  <g fill="#ffffff">
    <!-- Star 1 -->
    <circle cx="120" cy="50" r="1.5">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite" />
    </circle>
    <!-- Star 2 -->
    <circle cx="280" cy="180" r="2">
      <animate attributeName="opacity" values="1;0.3;1" dur="4.2s" repeatCount="indefinite" />
    </circle>
    <!-- Star 3 -->
    <circle cx="680" cy="60" r="1">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.5s" repeatCount="indefinite" />
    </circle>
    <!-- Star 4 -->
    <circle cx="480" cy="210" r="2.5" fill="#c8ff00" filter="url(#glow)">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="5s" repeatCount="indefinite" />
    </circle>
    <!-- Star 5 -->
    <circle cx="50" cy="190" r="1">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.5s" repeatCount="indefinite" />
    </circle>
    <!-- Star 6 -->
    <circle cx="730" cy="170" r="1.5">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Rotating Orbits Section -->
  <g transform="translate(620, 120)">
    <!-- Central Planet -->
    <circle cx="0" cy="0" r="24" fill="#0c1033" stroke="#2e4bd8" stroke-width="1.5" filter="url(#glow)" />
    <circle cx="-6" cy="-6" r="6" fill="#4b6bf5" opacity="0.4" />

    <!-- Orbit Line 1 -->
    <ellipse cx="0" cy="0" rx="65" ry="25" fill="none" stroke="#2e4bd8" stroke-dasharray="4 6" stroke-width="1" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" />
    </ellipse>

    <!-- Orbit Line 2 (Tilted) -->
    <g transform="rotate(30)">
      <ellipse cx="0" cy="0" rx="90" ry="35" fill="none" stroke="#c8ff00" stroke-dasharray="8 4" stroke-width="1" filter="url(#glow-lime)" opacity="0.45">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="28s" repeatCount="indefinite" />
      </ellipse>
      
      <!-- Planetoid on Orbit 2 -->
      <circle cx="90" cy="0" r="4.5" fill="#c8ff00" filter="url(#glow-lime)">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="28s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>

  <!-- SAST Branding Texts -->
  <g transform="translate(80, 100)">
    <!-- Main Header -->
    <text x="0" y="25" font-family="'Michroma', 'Arial Black', sans-serif" font-size="36" font-weight="bold" fill="#ffffff" letter-spacing="8">
      SAST
    </text>
    
    <!-- Subtitle / Campaign -->
    <text x="5" y="55" font-family="'Courier New', Courier, monospace" font-size="12" font-weight="bold" fill="#c8ff00" letter-spacing="4" filter="url(#glow-lime)">
      A NEW REALM // ACTIVE SYSTEM
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite" />
    </text>

    <!-- Technical Specs Lines -->
    <line x1="5" y1="75" x2="300" y2="75" stroke="#2e4bd8" stroke-width="1.5" opacity="0.7" />
    <line x1="5" y1="75" x2="60" y2="75" stroke="#c8ff00" stroke-width="2" filter="url(#glow-lime)">
      <animate attributeName="x1" values="5;240;5" dur="4s" repeatCount="indefinite" />
      <animate attributeName="x2" values="60;295;60" dur="4s" repeatCount="indefinite" />
    </line>
  </g>

  <!-- Flying Rocket Animation -->
  <g>
    <!-- Path Animation for Rocket -->
    <path id="flight-path" d="M -50,160 Q 200,90 450,150 T 850,70" fill="none" />
    
    <!-- Rocket Group following the path -->
    <g>
      <animateMotion dur="12s" repeatCount="indefinite" rotate="auto">
        <mpath href="#flight-path" />
      </animateMotion>
      
      <!-- Rocket Flame -->
      <path d="M -18,-3 L -28,0 L -18,3 Z" fill="#ff5d00" opacity="0.85">
        <animate attributeName="d" values="M -18,-3 L -28,0 L -18,3 Z; M -18,-3 L -34,0 L -18,3 Z; M -18,-3 L -28,0 L -18,3 Z" dur="0.15s" repeatCount="indefinite" />
      </path>
      <path d="M -18,-1.5 L -24,0 L -18,1.5 Z" fill="#ffb700" />

      <!-- Rocket Body -->
      <path d="M -15,-5 L 12,0 L -15,5 Z" fill="#ffffff" />
      <path d="M -15,-5 L -3,-5 L -6,-2 L -15,-2 Z" fill="#2e4bd8" />
      <path d="M -15,5 L -3,5 L -6,2 L -15,2 Z" fill="#2e4bd8" />
      <circle cx="-4" cy="0" r="1.5" fill="#2e4bd8" />
    </g>
  </g>

  <!-- Grid Pattern Overlay for futuristic HUD look -->
  <g opacity="0.07" fill="none" stroke="#2e4bd8" stroke-width="0.5">
    <path d="M 0,40 L 800,40 M 0,80 L 800,80 M 0,120 L 800,120 M 0,160 L 800,160 M 0,200 L 800,200" />
    <path d="M 100,0 L 100,240 M 200,0 L 200,240 M 300,0 L 300,240 M 400,0 L 400,240 M 500,0 L 500,240 M 600,0 L 600,240 M 700,0 L 700,240" />
  </g>
</svg>
